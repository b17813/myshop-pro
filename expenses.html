<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expenses | MyShop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0d2255;
            --ink-muted: #5A607A;
            --blue: #4a90e2;
            --blue-light: #EEF4FF;
            --blue-mid: #185FA5;
            --surface: #F8F9FA;
            --card: #FFFFFF;
            --border: rgba(0,0,0,0.07);
            --red: #FF3B30;
            --red-light: #FFF0EF;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--surface);
            color: var(--ink);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: linear-gradient(135deg, #6236FF 0%, #3B0FCC 100%);
            padding: 0 24px;
        }

        .header-inner {
            display: flex;
            align-items: center;
            height: 70px;
            gap: 16px;
        }

        .back-btn {
            width: 42px; height: 42px;
            border-radius: 14px;
            background: rgba(255,255,255,0.08);
            border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            flex-shrink: 0;
            text-decoration: none;
        }
        .back-btn:hover { background: rgba(255,255,255,0.14); }
        .back-btn:active { transform: scale(0.92); }
        .back-btn svg { stroke: white; }

        .header-text { flex: 1; }
        .header-text h1 {
            font-family: 'Inter', sans-serif;
            font-size: 20px;
            font-weight: 800;
            color: white;
            letter-spacing: -0.3px;
        }
        .header-text p {
            font-size: 12px;
            color: rgba(255,255,255,0.45);
            font-weight: 400;
            margin-top: 1px;
        }

        .header-badge {
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 5px 12px;
            border-radius: 20px;
            font-family: 'Inter', sans-serif;
        }

        .summary-strip {
            background: linear-gradient(160deg, #7C4FFF 0%, #4A1FCC 45%, #2D0FA8 100%);
            padding: 0 24px 28px 24px;
        }

        .summary-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .summary-card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 16px 18px;
        }

        .summary-card .label {
            font-size: 10px;
            font-weight: 600;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }

        .summary-card .value {
            font-family: 'Inter', sans-serif;
            font-size: 22px;
            font-weight: 800;
            color: white;
        }

        .summary-card .value.accent { color: #c7dcff; }

        .content {
            padding: 0 20px 100px;
            max-width: 600px;
            margin: 0 auto;
        }

        .filter-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            margin-bottom: 24px;
            animation: fadeUp 0.4s ease both;
        }

        .filter-group { flex: 1; }

        .filter-group label {
            display: block;
            font-size: 10px;
            font-weight: 600;
            color: var(--ink-muted);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 6px;
            margin-left: 4px;
        }

        .filter-group input[type="date"] {
            width: 100%;
            padding: 12px 14px;
            border-radius: 16px;
            border: 1.5px solid var(--border);
            background: var(--card);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            color: var(--ink);
            outline: none;
            transition: border-color 0.2s;
        }
        .filter-group input[type="date"]:focus { border-color: var(--blue); }

        .clear-btn {
            padding: 12px 18px;
            border-radius: 16px;
            border: 1.5px solid var(--border);
            background: var(--card);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: var(--ink-muted);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .clear-btn:hover { border-color: var(--blue); color: var(--blue-mid); }
        .clear-btn:active { transform: scale(0.96); }

        .section-label {
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--ink-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 14px;
        }

        .expense-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 18px 18px 18px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 12px;
            opacity: 0;
            animation: fadeUp 0.4s ease both;
            transition: box-shadow 0.2s, transform 0.2s;
            position: relative;
            overflow: hidden;
        }

        .expense-card::before {
            content: '';
            position: absolute;
            left: 0; top: 20%; bottom: 20%;
            width: 3px;
            background: var(--blue);
            border-radius: 0 3px 3px 0;
        }

        .expense-card:hover {
            box-shadow: 0 6px 24px rgba(74,144,226,0.13);
            transform: translateY(-2px);
        }

        .expense-icon {
            width: 46px; height: 46px;
            background: var(--blue-light);
            border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .expense-icon svg { width: 22px; height: 22px; }

        .expense-info { flex: 1; min-width: 0; }

        .expense-title {
            font-weight: 600;
            font-size: 15px;
            color: var(--ink);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .expense-date {
            font-size: 11px;
            color: var(--ink-muted);
            margin-top: 3px;
            font-weight: 400;
        }

        .expense-amount {
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: var(--blue-mid);
            white-space: nowrap;
        }

        .delete-btn {
            width: 36px; height: 36px;
            border-radius: 12px;
            background: var(--red-light);
            border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.2s, transform 0.15s;
        }
        .delete-btn:hover { background: var(--red); }
        .delete-btn:hover svg { stroke: white; }
        .delete-btn:active { transform: scale(0.9); }
        .delete-btn svg { stroke: var(--red); transition: stroke 0.2s; }

        .empty-state {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 60px 30px;
            text-align: center;
            animation: fadeUp 0.4s ease both;
        }

        .empty-icon {
            width: 64px; height: 64px;
            background: var(--blue-light);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
        }

        .empty-state h3 {
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 6px;
        }

        .empty-state p { font-size: 13px; color: var(--ink-muted); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .total-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: white;
            border-top: 1px solid var(--border);
            padding: 16px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
            box-shadow: 0 -8px 30px rgba(0,0,0,0.06);
        }

        .total-bar .tl { font-size: 12px; color: var(--ink-muted); font-weight: 500; }
        .total-bar .tv {
            font-family: 'Inter', sans-serif;
            font-size: 20px;
            font-weight: 800;
            color: var(--blue-mid);
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-inner">
            <a href="index.html" class="back-btn">
                <svg width="20" height="20" fill="none" stroke-width="2.5" viewBox="0 0 24 24">
                    <path d="M15 19l-7-7 7-7"/>
                </svg>
            </a>
            <div class="header-text">
                <h1>Expense History</h1>
                <p>Track where your money goes</p>
            </div>
            <div class="header-badge" id="count-badge">0 records</div>
        </div>
    </div>

    <div class="summary-strip">
        <div class="summary-cards">
            <div class="summary-card">
                <div class="label">Total Spent</div>
                <div class="value accent" id="summary-total">TZS 0</div>
            </div>
            <div class="summary-card">
                <div class="label">Transactions</div>
                <div class="value" id="summary-count">0</div>
            </div>
        </div>
    </div>

    <div class="content">
        <div class="filter-row">
            <div class="filter-group">
                <label>From</label>
                <input type="date" id="date-from" onchange="renderExpenses()">
            </div>
            <div class="filter-group">
                <label>To</label>
                <input type="date" id="date-to" onchange="renderExpenses()">
            </div>
            <button class="clear-btn" onclick="clearFilter()">All</button>
        </div>

        <div class="section-label" id="section-label">Recent Expenses</div>
        <div id="expense-list"></div>
    </div>

    <div class="total-bar">
        <span class="tl">Showing total</span>
        <span class="tv" id="bottom-total">TZS 0</span>
    </div>

    <script>
        function renderExpenses() {
            const expenseList = document.getElementById('expense-list');
            const dateFrom    = document.getElementById('date-from').value;
            const dateTo      = document.getElementById('date-to').value;

            const allTransactions = JSON.parse(localStorage.getItem('myShop_transactions')) || [];
            let filteredData = allTransactions.filter(t => t.type === 'expense');

            if (dateFrom || dateTo) {
                filteredData = filteredData.filter(t => {
                    const tDate = new Date(t.fullDate || t.date);
                    tDate.setHours(0,0,0,0);
                    if (dateFrom && dateTo) {
                        return tDate >= new Date(dateFrom) && tDate <= new Date(dateTo);
                    } else if (dateFrom) {
                        return tDate >= new Date(dateFrom);
                    } else {
                        return tDate <= new Date(dateTo);
                    }
                });
            }

            filteredData = [...filteredData].reverse();

            const total = filteredData.reduce((s, t) => s + parseFloat(t.amount), 0);

            document.getElementById('summary-total').innerText = 'TZS ' + total.toLocaleString();
            document.getElementById('summary-count').innerText = filteredData.length;
            document.getElementById('count-badge').innerText   = filteredData.length + ' record' + (filteredData.length !== 1 ? 's' : '');
            document.getElementById('bottom-total').innerText  = 'TZS ' + total.toLocaleString();
            document.getElementById('section-label').innerText =
                (dateFrom || dateTo) ? 'Filtered Results' : 'Recent Expenses';

            if (filteredData.length === 0) {
                expenseList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <svg width="28" height="28" fill="none" stroke="#185FA5" stroke-width="2" viewBox="0 0 24 24">
                                <path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/>
                            </svg>
                        </div>
                        <h3>No Expenses Found</h3>
                        <p>No records match the selected period.</p>
                    </div>`;
                return;
            }

            expenseList.innerHTML = '';

            filteredData.forEach((expense, idx) => {
                const originalIndex = allTransactions.findIndex(t => t === expense);
                const card = document.createElement('div');
                card.className = 'expense-card';
                card.style.animationDelay = (idx * 0.06) + 's';
                card.innerHTML = `
                    <div class="expense-icon">
                        <svg viewBox="0 0 24 24" fill="#185FA5">
                            <path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/>
                        </svg>
                    </div>
                    <div class="expense-info">
                        <div class="expense-title">${expense.title}</div>
                        <div class="expense-date">${expense.date} &bull; EXPENSE</div>
                    </div>
                    <div class="expense-amount">TZS ${parseFloat(expense.amount).toLocaleString()}</div>
                    <button class="delete-btn" onclick="deleteExpense(${originalIndex})">
                        <svg width="16" height="16" fill="none" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M3 6h18m-2 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                        </svg>
                    </button>
                `;
                expenseList.appendChild(card);
            });
        }

        function clearFilter() {
            document.getElementById('date-from').value = '';
            document.getElementById('date-to').value   = '';
            renderExpenses();
        }

        function deleteExpense(index) {
            if (confirm("Delete this expense?")) {
                let all = JSON.parse(localStorage.getItem('myShop_transactions')) || [];
                all.splice(index, 1);
                localStorage.setItem('myShop_transactions', JSON.stringify(all));
                renderExpenses();
            }
        }

        window.onload = renderExpenses;
    </script>
</body>
</html>
